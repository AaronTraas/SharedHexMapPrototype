<!DOCTYPE html>
<html>
<head>
  <link rel="icon" href="/favicon.ico"/>
  <title>Go service test harness</title>
  <script type="text/javascript" src="/script.js"></script>
  <style>
    #response {
      font-family: monospace;
      margin-top: 2em;
      padding: 1em;
      max-width: 80em;
      border: 1px solid black;
      height: 26lh;
      overflow: scroll;
      background-color: #333;
      color: #0A0;
      white-space: pre;
    }

    #debug-form label {
      display: inline-block;
      width: 150px;
      margin-bottom: 0.5lh;
    }
  </style>
</head>
<body>
  <h1>Hex Map API test harness</h1>

  <form id="debug-form">
    <label>Map Title:</label>
    <input id="form-map-title" name="map-title" disabled></input>
    <br>
    <label>Map filename:</label>
    <input id="form-map-name" name="map-name" disabled></input>
    <br>
    <label>Map version:</label>
    <input id="form-map-version" name="map-version" disabled></input>
    <hr>
    <label>Row, Column:</label>
    <select id="form-grid-row" name="grid-row"></select>
    <select id="form-grid-column" name="grid-column"></select>
    <br>
    <label>Terrain Type:</label>
    <input id="form-terrain-type" name="terrain-type"></input>
    <br>
    <label>Contents:</label>
    <input id="form-cell-contents" name="cell-contents"></input>
  </form>
  <hr>
  <button id="save-button">Save</button>

  <div id="response">
    HTTP responses go here...
  </div>
</body>
</html>
