<!DOCTYPE html>
<html>
<head>
  <link rel="icon" href="/favicon.ico"/>
  <title>Go service test harness</title>
  <script type="text/javascript" src="/map_api.js"></script>
  <style>
    #response {
      font-family: monospace;
      margin-top: 2em;
      padding: 1em;
      max-width: 80em;
      border: 1px solid black;
      height: 26lh;
      overflow: scroll;
      background-color: #333;
      color: #0A0;
      white-space: pre;
    }

    #debug-form label {
      display: inline-block;
      width: 150px;
      margin-bottom: 0.5lh;
    }
  </style>
</head>
<body>
  <h1>Hex Map API test harness</h1>

  <form id="debug-form">
    <label>Map Title:</label>
    <input id="form-map-title" name="map-title" disabled></input>
    <br>
    <label>Map filename:</label>
    <input id="form-map-name" name="map-name" disabled></input>
    <br>
    <label>Map version:</label>
    <input id="form-map-version" name="map-version" disabled></input>
    <hr>
    <label>Row, Column:</label>
    <select id="form-grid-row" name="grid-row"></select>
    <select id="form-grid-column" name="grid-column"></select>
    <br>
    <label>Terrain Type:</label>
    <input id="form-terrain-type" name="terrain-type"></input>
    <br>
    <label>Contents:</label>
    <input id="form-cell-contents" name="cell-contents"></input>
  </form>
  <hr>
  <button id="save-button">Save</button>

  <div id="response">
    HTTP responses go here...
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', (event) => {
      console.debug('Script loaded')
      const map_name = document.getElementById('form-map-name')
      const map_title = document.getElementById('form-map-title')
      const map_version = document.getElementById('form-map-version')
      const grid_row = document.getElementById('form-grid-row')
      const grid_column = document.getElementById('form-grid-column')
      const terrain_type = document.getElementById('form-terrain-type')
      const cell_contents = document.getElementById('form-cell-contents')
      const response_output = document.getElementById('response')

      const save_button = document.getElementById('save-button')

      var mapCells = [[]]

      const load_map = async function(mapName) {
        console.log(`map '${mapName}' selected`)

        const map = await loadMap(mapName);

        response_output.innerHTML = JSON.stringify(map, null, 2);

        map_name.value = mapName
        map_title.value = map["title"]
        map_version.value = map["version"]

        mapCells = map["cells"]

        const row_count = mapCells.length
        const col_count = mapCells[0].length

        grid_row.innerHTML = ''
        for(let i = 0; i < row_count; i++) {
          const newOption = new Option(i, i);
          grid_row.add(newOption);
        }
        grid_column.innerHTML = ''
        for(let i = 0; i < col_count; i++) {
          const newOption = new Option(i, i);
          grid_column.add(newOption);
        }

        grid_column.dispatchEvent(new Event('change'))
      }

      const cell_select_handler = async function(event) {
        const row = grid_row.value
        const col = grid_column.value
        const cell = mapCells[row][col]

        console.log(`Cell (${row}, ${col}) selected - ${JSON.stringify(cell)}`)

        terrain_type.value = cell["type"]
        cell_contents.value = cell["contents"]
      }

      const save_handler = async function() {
        const response = await saveHex(
                                map_name.value,
                                grid_row.value,
                                grid_column.value,
                                terrain_type.value,
                                cell_contents.value
                              );

        response_output.innerHTML = JSON.stringify(response, null, 2);

        load_map(map_name.value)
      }

      grid_row.addEventListener('change', cell_select_handler);
      grid_column.addEventListener('change', cell_select_handler);
      save_button.addEventListener('click', save_handler);

      const params = new URLSearchParams(window.location.hash.slice(1));
      if (params.has('map')) {
        load_map(params.get('map'))
      } else {
        window.location.href = "/";
      }
    })
  </script>
</body>
</html>
