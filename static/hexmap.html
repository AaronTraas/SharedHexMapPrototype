<!DOCTYPE html>
<html>
<head>
  <title id="heading_title" ></title>
  <link rel="stylesheet" href="hexmap.css" />
  <script type="text/javascript" src="/map_api.js"></script>
</head>
<body>

<h1 id="title_heading" onclick="handleMapSettingsDialogShow()"></h1>

<dialog id="hex_dialog" title="Basic dialog">
  <header>
    <button onclick="hex_dialog.close('cancel')">X</button>
    <h2>Edit Tile</h2>
  </header>

  <form>
    <label for="hex_dialog_id">Hex ID:</label>
    <input id="hex_dialog_id"></input>

    <label for="hex_dialog_select">Terrain: </label>
    <select id="hex_dialog_select"></select>

    <label>Notes:</label>
    <textarea id="hex_dialog_textarea" rows="20" cols="80" placeholder="Enter notes about this hex here."></textarea>
  </form>
  <footer>
    <button onclick="hex_dialog.close('cancel')">Cancel</button>
    <button class="primary" onclick="hex_dialog.close('save')">Save</button>
  </footer>
</dialog>

<dialog id="map_settings_dialog" title="Basic dialog">
  <header>
    <button onclick="map_settings_dialog.close('cancel')">X</button>
    <h2>Edit Tile</h2>
  </header>

  <form>
    <label for="map_settings_dialog_filename">Filename:</label>
    <input id="map_settings_dialog_filename" disabled></input>

    <label for="map_settings_dialog_rows">Rows:</label>
    <input id="map_settings_dialog_rows" disabled></input>

    <label for="map_settings_dialog_cols">Columns:</label>
    <input id="map_settings_dialog_cols" disabled></input>

    <label for="map_settings_dialog_version">Version:</label>
    <input id="map_settings_dialog_version" disabled></input>

  </form>
  <footer>
    <button onclick="map_settings_dialog.close('cancel')">Cancel</button>
    <button class="primary" onclick="map_settings_dialog.close('save')">Save</button>
  </footer>
</dialog>


</body>

<script>

class HexTypeAttributes {
  constructor( text, bg, fg ) {
    this.text = text;
    this.bg = bg;
    this.fg = fg;
  }
}

const hex_attributes_by_type = {
  'unknown'  : new HexTypeAttributes('Unknown'     , 'darkgray',      'black'),
  'arctic'   : new HexTypeAttributes('Arctic'      , 'snow',          'black'),
  'badlands' : new HexTypeAttributes('Badlands'    , 'orange',        'white'),
  'coastal'  : new HexTypeAttributes('Coastal'     , 'sandybrown',    'black'),
  'desert'   : new HexTypeAttributes('Desert'      , 'yellow',        'black'),
  'farmland' : new HexTypeAttributes('Farmland'    , 'wheat',         'black'),
  'forest'   : new HexTypeAttributes('Forest'      , 'forestgreen',   'white'),
  'grassland': new HexTypeAttributes('Grassland'   , 'lime',          'black'),
  'hills'    : new HexTypeAttributes('Hills'       , 'peru',          'white'),
  'mountains': new HexTypeAttributes('Mountains'   , 'brown',         'white'),
  'swamp'    : new HexTypeAttributes('Swamp'       , 'gray',          'black'),
  'urban'    : new HexTypeAttributes('Urban'       , 'silver',        'black'),
  'deepwater': new HexTypeAttributes('Deep Water'  , 'navy',          'white'),
  'shallows' : new HexTypeAttributes('Shallows'    , 'aqua',          'black'),
  'river9'   : new HexTypeAttributes('River N:S'   , 'aqua',          'black'),
  'river18'  : new HexTypeAttributes('River SW:NE' , 'aqua',          'black'),
  'river36'  : new HexTypeAttributes('River NW:SE' , 'aqua',          'black'),
};

const hex_types = Object.keys(hex_attributes_by_type);

const MAP_X = 40;
const MAP_Y = 51;


function displayCordinates(x, y){
  //return `${x}, ${(MAP_Y/2 | 0)-y}`;
  return `${x}, ${y}`;
}

function handleMapSettingsDialogShow() {
  map_settings_dialog.showModal();
}

function handleMapSettingsDialogClose(){
}

function handleHexDialogClose() {
  if( hex_dialog.returnValue === "save" && hex_dialog_close_callback) {
    hex_dialog_close_callback();
  }
  hex_dialog_close_callback = null;
}

function getRandomHexType() {
  return hex_types[(Math.random() * hex_types.length) | 0];
}

class HexData {
  constructor( x, y, hexType = 'unknown', content = null ) {
    this.x = x;
    this.y = y;
    this.btn = document.createElement("BUTTON");
    if( content ) {
      this.notes = content;
    } else {
      this.notes = '';
    }
    this.btn.textContent = displayCordinates(x, y);
    this.btn.id = `${x}_${y}`;
    this.btn.classList.add('hex');
    //this.setHexType(getRandomHexType());
    this.setHexType(hexType);
    this.btn.addEventListener("click", () => this.handleClick() );
  }

  setHexType(hex_type) {
    if( !Object.hasOwn(hex_attributes_by_type, hex_type) ) {
      hex_type = 'unknown'
    }
    if (this.type) {
      this.btn.classList.remove(this.type);
    }
    this.type = hex_type;
    this.btn.classList.add(hex_type);
    let attr = hex_attributes_by_type[hex_type];
    if (this.notes) {
      this.btn.title=attr.text+"\n"+this.notes.split("\n")[0];
    } else {
      this.btn.title=attr.text;
    }
    this.btn.style.backgroundColor = attr.bg;
    this.btn.style.color = attr.fg;
  }

  handleClick() {
    hex_dialog_id.value = this.btn.id;
    hex_dialog_textarea.value = this.notes;
    hex_dialog_select.value = this.type;

    hex_dialog_close_callback = () => this.handleHexDialogClose();

    hex_dialog.showModal();
  }

  handleHexDialogClose() {
    if ( this.notes != hex_dialog_textarea.value ||
         this.type != hex_dialog_select.value ) {
      this.notes = hex_dialog_textarea.value;
      this.setHexType(hex_dialog_select.value);
      this.saveHex();
    }
  }

  async saveHex() {
    const content = {
      "type": this.type,
      "notes": this.notes
    }

    const response = await saveHex(
                            map_settings_dialog_filename.value,
                            this.x, // row
                            this.y, // column
                            JSON.stringify(content)
                          );

    console.debug(`Save response: ${JSON.stringify(response, null, 2)}`);
  }
}

class HexMap {
  constructor( columns, rows, mapCells = null, defaultHexData=null ) {
    this.columns = columns;
    this.rows = rows;
    this.hexes = [];
    let map = document.createElement("DIV");
    map.classList.add('map');
    for (let i = 0; i < columns; ++i) {
      let d = document.createElement("DIV");
      d.classList.add('map_column');
      this.hexes[i] = [];
      for (let j = 0; j < rows; ++j) {
        let cellName = `${i}/${j}`
        let cell = Object.hasOwn(mapCells, cellName) ? JSON.parse(mapCells[cellName]) : defaultHexData;
        let type = Object.hasOwn(cell, "type") ? cell["type"] : "unknown";
        let notes = Object.hasOwn(cell, "notes") ? cell["notes"] : null;
        //console.log(type, notes)
        let b = new HexData(i, j, type, notes);
        this.hexes[i][j] = b;
        d.appendChild(b.btn);
      }
      map.appendChild(d);
    }
    document.body.appendChild(map);
  }

  getHexData( x, y ) {
    return this.hexes[x][y];
  }
}

function populateHexDialogSelect() {
  hex_types.forEach(hex_type => {
    const option = document.createElement("OPTION");
    const attr = hex_attributes_by_type[hex_type];
    option.style.backgroundColor = attr.bg;
    option.style.color = attr.fg;
    option.textContent = attr.text;
    option.value = hex_type;
    hex_dialog_select.appendChild(option);
  });

  hex_dialog.addEventListener("close", handleHexDialogClose );
}

function setTitle(title) {
  map_title_heading.textContent = title;
  map_heading_title.textContent = title;
}

function updateMap() {
  if(!document.hidden) {
    getMapVersion(map_settings_dialog_filename.value).then( version => {
      if (version != map_settings_dialog_version.value ) {
        //do something better
        location.reload();
      }
    });
  }
}


var updateTimer = setInterval(updateMap, 3000);
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") {
    updateMap();
    clearInterval(updateTimer);
    updateTimer = setInterval(updateMap, 3000);
  } else {
    clearInterval(updateTimer);
  }
});

var map_version = -1;
var hex_dialog_close_callback = null;
const hex_dialog = document.getElementById('hex_dialog');
const hex_dialog_select = document.getElementById('hex_dialog_select');
const hex_dialog_id = document.getElementById('hex_dialog_id');
const hex_dialog_textarea = document.getElementById('hex_dialog_textarea');
const map_settings_dialog  = document.getElementById('map_settings_dialog');
const map_settings_dialog_filename  = document.getElementById('map_settings_dialog_filename');
const map_settings_dialog_rows  = document.getElementById('map_settings_dialog_rows');
const map_settings_dialog_cols  = document.getElementById('map_settings_dialog_cols');
const map_settings_dialog_version  = document.getElementById('map_settings_dialog_version');

map_settings_dialog_version
const map_title_heading = document.getElementById('title_heading');
const map_heading_title = document.getElementById('heading_title');
populateHexDialogSelect();
map_settings_dialog.addEventListener("close", handleMapSettingsDialogClose );


const params = new URLSearchParams(window.location.hash.slice(1));
if (params.has('map')) {
  const mapFilename = params.get('map');
  map_settings_dialog_filename.value = mapFilename;

  loadMap(mapFilename).then(map => {
    setTitle(map["title"]);
    const mapCells = map["cells"];
    map_settings_dialog_version.value = map["version"];
    const row_count = map["max_x"];
    map_settings_dialog_rows.value = row_count;
    const col_count = map["max_y"];
    map_settings_dialog_cols.value = col_count;

    //console.log(JSON.stringify(mapCells, null, 2))

    var hex_map = new HexMap(row_count, col_count, mapCells, JSON.parse(map["default"]));
  });

}
else {
  setTitle("The Map");
  var hex_map = new HexMap(MAP_X, MAP_Y);
}


</script>
</html>
