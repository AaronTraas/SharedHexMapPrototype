<!DOCTYPE html>
<html>
<head>
  <link rel="icon" href="/favicon.ico"/>
  <title>List of maps</title>
  <script type="text/javascript" src="/map_api.js"></script>
</head>
<body>
  <h1>Hex Maps</h1>

  <ul id="map-list"></ul>

  <hr>

  <a href="hexmap.html">HEXMAP Front End</a>

  <script>
    document.addEventListener('DOMContentLoaded', async (event) => {
      const map_list = document.getElementById('map-list')

      const maps = await getMapList()
      console.log(JSON.stringify(maps))

      maps.forEach(mapEntry => {
        const li = document.createElement("li");

        const a = document.createElement("a");
        a.href = `/debug.html#?map=${mapEntry.filename}`;
        a.textContent = `${mapEntry.title} (v${mapEntry.version})`;

        li.appendChild(a);

        map_list.appendChild(li);
      })
    });
  </script>
</body>
</html>
