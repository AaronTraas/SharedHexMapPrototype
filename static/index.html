<!DOCTYPE html>
<html>
<head>
  <link rel="icon" href="/favicon.ico"/>
  <title>List of maps</title>
  <script type="text/javascript" src="/map_api.js"></script>
</head>
<body>
  <h1>Hex Maps</h1>

  <ul id="map-list"></ul>

  <script>
    document.addEventListener('DOMContentLoaded', async (event) => {
      const map_list = document.getElementById('map-list')

      const maps = await getMapList()
      console.log(JSON.stringify(maps))

      maps.forEach(mapEntry => {
        const li = document.createElement("li");

        const aMap = document.createElement("a");
        aMap.href = `/hexmap.html#?map=${mapEntry.filename}`;
        aMap.textContent = `${mapEntry.title} (v${mapEntry.version})`;

        const aDebug = document.createElement("a");
        aDebug.href = `/debug.html#?map=${mapEntry.filename}`;
        aDebug.textContent = `DEBUG`;

        li.append(aMap, " — ", aDebug);

        map_list.appendChild(li);
      })
    });
  </script>
</body>
</html>
